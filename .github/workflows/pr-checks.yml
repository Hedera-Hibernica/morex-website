name: PR checks

# Runs on every pull request targeting main. No AWS access — just validates the
# static site so reviewers get a pass/fail signal before approving a merge.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal links resolve to real pages
        run: |
          python3 - <<'PY'
          import glob, re, sys, os

          missing = []
          pages = sorted(glob.glob("*.html"))
          if "index.html" not in pages:
              print("::error::index.html is missing")
              sys.exit(1)

          for page in pages:
              html = open(page, encoding="utf-8").read()
              for href in re.findall(r'href="([^"]+)"', html):
                  # only check local .html links (skip http, mailto, #anchors, data: URIs)
                  if href.startswith(("http", "mailto:", "#", "data:")):
                      continue
                  target = href.split("#")[0].split("?")[0]
                  if target.endswith(".html") and not os.path.exists(target):
                      missing.append(f"{page} -> {target}")

          if missing:
              print("::error::Broken internal links found:")
              for m in missing:
                  print(f"  {m}")
              sys.exit(1)

          print(f"OK: {len(pages)} pages, all internal links resolve.")
          PY
